<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="/style.css"></head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; background:#111; color:white;">
    <h1 id="timer" style="font-size: 15rem; margin: 0;">00:00</h1>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared.js"></script>
    <script>
        setupFullscreen();
        function updateUI(state) {
            const mins = Math.floor(state.currentRace.timeLeft / 60).toString().padStart(2, '0');
            const secs = (state.currentRace.timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }
    </script>
</body>
</html>
