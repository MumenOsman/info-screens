<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="flag-display" class="flag-screen bg-Danger"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared.js"></script>
    <script>
        setupFullscreen();
        function updateUI(state) {
            document.getElementById('flag-display').className =
                `flag-screen bg-${state.race.mode}`;
        }
        // race:modeChanged fires without a full state_update — update the flag immediately
        socket.on('race:modeChanged', (data) => {
            document.getElementById('flag-display').className =
                `flag-screen bg-${data.mode}`;
        });
    </script>
</body>

</html>
