<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Leaderboard | Beachside Racetrack</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <main class="dashboard-container fullscreen-mode">
        <header class="dashboard-header">
            <div>
                <h1>Live Leaderboard</h1>
                <p class="subtitle">Beachside Racetrack Real-Time Standings</p>
            </div>
            <div id="race-info" class="status-badge">Waiting for race data...</div>
        </header>

        <div class="table-wrapper">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Car</th>
                        <th>Driver</th>
                        <th class="text-center">Laps</th>
                        <th class="text-right">Fastest Lap</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body">
                </tbody>
            </table>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared.js"></script>
    <script>
        setupFullscreen();

        // --- RENDER HELPERS ---

        function formatTime(secs) {
            const m = Math.floor(secs / 60).toString().padStart(2, '0');
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateMode(mode, remainingTime) {
            const infoBadge = document.getElementById('race-info');
            infoBadge.innerHTML =
                `Track: <strong>${mode}</strong> &nbsp;|&nbsp; ⏱ ${formatTime(remainingTime)}`;
            infoBadge.className = `status-badge bg-${mode}`;
            infoBadge.style.color = mode === 'Hazard' ? '#000' : '#fff';
            infoBadge.style.textShadow =
                mode === 'Finish' ? '2px 2px 5px rgba(0,0,0,0.9)' : 'none';
        }

        function renderLeaderboard(entries) {
            const tbody = document.getElementById('leaderboard-body');
            if (!entries || entries.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center empty-state"
                    style="padding:40px;">No active race session. Waiting for drivers to queue.</td></tr>`;
                return;
            }
            tbody.innerHTML = entries.map((d, index) => {
                const isFirst = index === 0 && d.fastestLap !== null;
                const posDisplay  = isFirst ? '🥇 1' : index + 1;
                const fastDisplay = d.fastestLap !== null
                    ? `<span class="time-highlight">${d.fastestLap.toFixed(3)}s</span>`
                    : '<span class="time-muted">No Time</span>';
                const safeDriver = escapeHtml(d.driver);
                return `
                <tr class="${isFirst ? 'row-first-place' : ''}">
                    <td class="pos-column">${posDisplay}</td>
                    <td><span class="car-badge">${d.car}</span></td>
                    <td class="driver-column">${safeDriver}</td>
                    <td class="text-center lap-column">${d.lapCount}</td>
                    <td class="text-right">${fastDisplay}</td>
                </tr>`;
            }).join('');
        }

        // Build leaderboard entries from the full state object
        function buildLeaderboardFromState(state) {
            const session = state.sessions && state.sessions[state.currentSessionIndex];
            if (!session || !session.drivers || session.drivers.length === 0) return [];

            const entries = session.drivers.map(driverName => {
                const lapData    = state.laps && state.laps[driverName];
                const lapTimes   = lapData ? lapData.lapTimes : [];
                const fastestLap = lapTimes.length > 0 ? Math.min(...lapTimes) : null;
                return {
                    driver: driverName,
                    car: state.cars && state.cars[driverName],
                    lapCount: lapData ? lapData.lapCount : 0,
                    fastestLap
                };
            });

            return entries.sort((a, b) => {
                if (a.fastestLap === null && b.fastestLap === null) return 0;
                if (a.fastestLap === null) return 1;
                if (b.fastestLap === null) return -1;
                return a.fastestLap - b.fastestLap;
            });
        }

        // --- MAIN UPDATE ---

        function updateUI(state) {
            updateMode(state.race.mode, state.race.remainingTime);
            renderLeaderboard(buildLeaderboardFromState(state));
        }

        // --- LIVE PARTIAL EVENTS ---

        // Lap recorded: server sends pre-sorted leaderboard data directly
        socket.on('leaderboard:updated', (entries) => {
            renderLeaderboard(entries);
        });

        // Timer tick: only update the badge, no full re-render
        socket.on('timer:update', (data) => {
            if (!currentState) return;
            currentState.race.remainingTime = data.remainingTime;
            updateMode(currentState.race.mode, data.remainingTime);
        });

        // Mode changed: update badge color and text
        socket.on('race:modeChanged', (data) => {
            if (!currentState) return;
            currentState.race.mode = data.mode;
            updateMode(data.mode, currentState.race.remainingTime);
        });
    </script>
</body>

</html>
