<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Desk | Beachside Racetrack</title>
    <link rel="stylesheet" href="/style.css">

</head>

<body>
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2>Receptionist Access</h2>
            <p>Please enter your credentials to manage the race queue.</p>
            <input type="password" id="auth-key" class="auth-input" placeholder="Enter Access Key">
            <button id="auth-btn" class="btn-auth"
                onclick="socket.emit('auth', { role: 'receptionist', key: document.getElementById('auth-key').value })">Unlock</button>
            <p id="auth-error" class="error-text"></p>
        </div>
    </div>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h1>Front Desk</h1>
                <p class="subtitle">Manage Upcoming Race Sessions</p>
            </div>
            <button class="btn-action" onclick="createSession()">
                <span class="icon">🏁</span> Create New Session
            </button>
        </header>

        <hr class="divider">

        <div id="sessions-container" class="queue-section">
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared.js"></script>
    <script>

        initAuth('receptionist');

        let frontDeskState = { sessions: [], cars: {} };

        // --- VALIDATION (FIXED FOR STRINGS) ---
        function isNameDuplicate(newName) {
            const lowerName = newName.trim().toLowerCase();

            for (const session of frontDeskState.sessions) {
                if (!session.drivers) continue;
                for (const driverName of session.drivers) {
                    // Since it's just an array of strings, we compare the string directly
                    if (driverName.toLowerCase() === lowerName) return true;
                }
            }
            return false;
        }

        // --- SESSION ACTIONS ---
        function createSession() {
            // Using frontDeskState.sessions.length here so it doesn't error out
            const name = prompt("Enter a name for this session (Optional):", `Session ${frontDeskState.sessions.length + 1}`);
            if (name !== null) {
                socket.emit('add_session', name);
            }
        }

        function deleteSession(sessionId) {
            if (confirm('Are you sure you want to delete this entire session?')) {
                socket.emit('delete_session', sessionId);
            }
        }

        // --- DRIVER ACTIONS ---
        function addDriver(sessionId) {
            const inputEl = document.getElementById(`new-driver-${sessionId}`);
            const driverName = inputEl.value.trim();

            if (!driverName) return;
            if (isNameDuplicate(driverName)) {
                alert(`Driver name "${driverName}" is already in a session! Names must be unique.`);
                return;
            }

            socket.emit('add_driver', { sessionId, driverName });
            inputEl.value = '';
            inputEl.focus();
        }

      function assignCar(sessionId, driverName) {
    const current = (frontDeskState.cars && frontDeskState.cars[driverName]) || '?';
    const input = prompt(`Assign car number for ${driverName} (current: ${current}):`, current);
    
    if (input === null || input.trim() === '') return;
    
    const num = parseInt(input, 10);
    if (isNaN(num) || num < 1) { 
        alert('Please enter a valid car number (1 or higher).'); 
        return; 
    }
    
    // Send the request to the server, then stop. The server handles the rest!
    socket.emit('set_car', { driverName, carNumber: num });
}

        function editDriver(sessionId, currentName) {
            const newName = prompt("Edit driver name:", currentName);
            if (!newName || newName.trim() === currentName) return;

            if (isNameDuplicate(newName)) {
                alert(`Cannot rename to "${newName}". That name is already taken!`);
                return;
            }

            socket.emit('update_driver', { sessionId, oldName: currentName, newName: newName.trim() });
        }

        function removeDriver(sessionId, driverName) {
            if (confirm(`Remove ${driverName} from the session?`)) {
                socket.emit('remove_driver', { sessionId, driverName });
            }
        }

        // --- DRIVER ACTION HELPERS USING DATA ATTRIBUTES ---
        // These are called from buttons generated in innerHTML.
        // They read the raw driver name from a data attribute instead of
        // injecting it into the onclick string, which avoids escaping issues.
        function handleAssignCar(btn) {
            assignCar(parseInt(btn.dataset.sid), btn.dataset.name);
        }
        function handleEditDriver(btn) {
            editDriver(parseInt(btn.dataset.sid), btn.dataset.name);
        }
        function handleRemoveDriver(btn) {
            removeDriver(parseInt(btn.dataset.sid), btn.dataset.name);
        }
        function handleDeleteSession(btn) {
            if (confirm('Are you sure you want to delete this entire session?')) {
                socket.emit('delete_session', parseInt(btn.dataset.sid));
            }
        }
        function handleAddDriver(btn) {
            const sessionId = parseInt(btn.dataset.sid);
            const inputEl = document.getElementById(`new-driver-${sessionId}`);
            const driverName = inputEl.value.trim();
            if (!driverName) return;
            if (isNameDuplicate(driverName)) {
                alert(`Driver name "${driverName}" is already in a session! Names must be unique.`);
                return;
            }
            socket.emit('add_driver', { sessionId, driverName });
            inputEl.value = '';
            inputEl.focus();
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function handleEnter(event, inputEl) {
            if (event.key === 'Enter') {
                handleAddDriver(inputEl);
            }
        }

        function updateUI(state) {
            frontDeskState = state;
            const container = document.getElementById('sessions-container');
            const isRaceRunning = state.race && (state.race.running || state.race.mode === 'Finish');

            const sessionsToShow = isRaceRunning
                ? state.sessions.filter((_, i) => i !== state.currentSessionIndex)
                : state.sessions;

            if (!sessionsToShow || sessionsToShow.length === 0) {
                container.innerHTML = isRaceRunning
                    ? `<p class="empty-state">Race in progress. No further sessions queued yet.</p>`
                    : `<p class="empty-state">No active sessions. Create a new session to begin adding drivers.</p>`;
                return;
            }

            let html = '';

            sessionsToShow.forEach((session) => {
                const globalIndex = state.sessions.indexOf(session);
                const safeName = escapeHtml(session.name || 'Session ' + (globalIndex + 1));
                html += `
                <div class="session-card">
                    <div class="session-header">
                        <h3>${safeName}</h3>
                        <div class="session-actions">
                            ${!isRaceRunning
                        ? `<button data-sid="${session.id}" onclick="handleDeleteSession(this)" style="background: #dc3545; color: white;">🗑️ Delete Session</button>`
                        : '<span style="color: var(--text-muted); font-size: 0.85rem;">🔒 Locked during race</span>'
                    }
                        </div>
                    </div>

                    ${!isRaceRunning ? `
                    <div class="input-group">
<input type="text" id="new-driver-${session.id}" class="control-input" placeholder="Enter Driver Name..." onkeypress="handleEnter(event, this)" data-sid="${session.id}">                        <button class="btn-action" data-sid="${session.id}" onclick="handleAddDriver(this)">➕ Add to Session</button>
                    </div>` : ''}

                    <ul class="driver-list">
                `;

                if (!session.drivers || session.drivers.length === 0) {
                    html += `<li><em>No drivers added to this session yet.</em></li>`;
                } else {
                    session.drivers.forEach(driverName => {
                        const carNum = state.cars && state.cars[driverName] ? state.cars[driverName] : '?';
                        const safeDriver = escapeHtml(driverName);

                        html += `
                        <li class="driver-item">
                            <span><span class="car-badge">Car ${carNum}</span> <strong>${safeDriver}</strong></span>
                            <div class="driver-controls">
                                ${!isRaceRunning ? `
                                <button data-sid="${session.id}" data-name="${safeDriver}" onclick="handleAssignCar(this)">🔢 Car</button>
                                <button data-sid="${session.id}" data-name="${safeDriver}" onclick="handleEditDriver(this)">✏️ Edit</button>
                                <button data-sid="${session.id}" data-name="${safeDriver}" onclick="handleRemoveDriver(this)">❌</button>
                                ` : ''}
                            </div>
                        </li>
                        `;
                    });
                }

                html += `</ul></div>`;
            });

            container.innerHTML = html;
        }

        // --- MISSING SOCKET LISTENERS ---
        // These tell the browser to redraw the screen whenever the server sends new state data
        socket.on('state_update', updateUI);

        socket.on("session:error", (msg) => {
            alert(msg);
        });
    </script>
</body>

</html>
