<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lap Tracker | Beachside Racetrack</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2>Lap-Line Observer</h2>
            <p>Enter your access key to begin tracking laps.</p>
            <input type="password" id="auth-key" class="auth-input" placeholder="Enter Access Key">
            <button id="auth-btn" class="btn-auth">Unlock</button>
            <p id="auth-error" class="error-text"></p>
        </div>
    </div>

    <main class="dashboard-container tracker-container">
        <header class="dashboard-header tracker-header">
            <div>
                <h1>Lap Tracker</h1>
                <p id="tracker-status" class="subtitle">Waiting for race data...</p>
            </div>
        </header>

        <div id="button-container" class="car-grid">
            </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/shared.js"></script>
    <script>
        initAuth('observer');

        // Visual "flash" feedback + emit correct event with driver name
        function logLap(btnElement) {
            const driverName = btnElement.getAttribute('data-driver');
            socket.emit('lap:record', driverName);

            btnElement.classList.add('tapped');
            setTimeout(() => {
                btnElement.classList.remove('tapped');
            }, 150);
        }

        function updateUI(state) {
            const container = document.getElementById('button-container');
            const status    = document.getElementById('tracker-status');

            // Race has finished — disable buttons and show message
            if (state.race.mode === 'Finish' || (!state.race.running && state.race.mode === 'Danger')) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1; padding: 60px;">
                        <h2>🏁 Race Finished</h2>
                        <p>Waiting for the Safety Official to end the session.</p>
                    </div>`;
                status.innerText = "Session concluded.";
                return;
            }

            // No active race
            if (!state.race.running) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1; padding: 60px;">
                        <h2>No active race.</h2>
                        <p>Waiting for Race Control to start the timer.</p>
                    </div>`;
                status.innerText = "Standby.";
                return;
            }

            // Race running — build one button per driver, showing their car number
            const currentSession = state.sessions && state.sessions[state.currentSessionIndex];
            const drivers = (currentSession && currentSession.drivers) || [];

            status.innerText = "Tap car number when it crosses the line!";

            // Only re-render if driver count changed, to avoid interrupting rapid taps
            const currentButtonCount = container.querySelectorAll('.btn-car').length;
            if (currentButtonCount !== drivers.length) {
                container.innerHTML = drivers.map(driverName => {
                    const carNum = (state.cars && state.cars[driverName]) || '?';
                    // escapeHtml on data-driver attribute to prevent attribute injection
                    const safeDriver = escapeHtml(driverName);
                    return `<button class="btn-large btn-car" data-driver="${safeDriver}" onclick="logLap(this)">
                        ${carNum}
                    </button>`;
                }).join('');
            }
        }

        // React to partial events that don't include a full state_update
        socket.on('race:modeChanged', (data) => {
            if (!currentState) return;
            currentState.race.mode = data.mode;
            if (data.mode === 'Finish') currentState.race.running = false;
            updateUI(currentState);
        });
    </script>
</body>
</html>
